version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GENLAYER_RPC_URL=${GENLAYER_RPC_URL:-https://bradbury.genlayer.com/rpc}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS:-}
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    working_dir: /app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MOCK_USDL_ADDRESS=${NEXT_PUBLIC_MOCK_USDL_ADDRESS:-}
      - NEXT_PUBLIC_BET_FACTORY_ADDRESS=${NEXT_PUBLIC_BET_FACTORY_ADDRESS:-}
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      - backend
